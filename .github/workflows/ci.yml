name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run publint
      # Regression guard for the packaging shape (issue #18): the tarball must
      # import in plain Node ESM and typecheck against a consumer with types: [].
      - run: npm run verify:pack
